name: ParkFlow NEO - CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: parkflow
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Ejecutar pruebas unitarias
        working-directory: Back-end/backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/parkflow
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
        run: ./mvnw test

      - name: Publicar resultados de pruebas unitarias
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: Back-end/backend/target/surefire-reports/

      - name: Arrancar backend en background
        working-directory: Back-end/backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/parkflow
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
        run: ./mvnw spring-boot:run &

      - name: Esperar que el backend arranque
        run: |
          echo "Esperando backend..."
          for i in {1..30}; do
            curl -s http://localhost:8080/actuator/health && echo "Backend listo!" && break
            echo "Intento $i/30..."
            sleep 5
          done

      - name: Instalar Newman
        run: npm install -g newman

      - name: Ejecutar pruebas de API con Newman
        run: |
          newman run postman_collection.json \
            --reporters cli

      - name: Publicar resultados Newman
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-results
          path: newman/

      - name: Escaneo de secretos con Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Escaneo de vulnerabilidades con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
      - name: Publicar reporte Trivy
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.json

      - name: Instalar dependencias frontend
        working-directory: parkflow-frontend
        run: npm install

      - name: Ejecutar pruebas de GUI con Cypress
        working-directory: parkflow-frontend
        run: npx cypress run --spec "cypress/e2e/parkflow.cy.js" --browser electron
        continue-on-error: true

      - name: Publicar screenshots Cypress
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-screenshots
          path: parkflow-frontend/cypress/screenshots/

      - name: SAST con Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten
        continue-on-error: true

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "ParkFlow NEO"
          path: "."
          format: "HTML"
        continue-on-error: true

      - name: Publicar reporte OWASP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: reports/
