apiVersion: apps/v1
kind: Deployment
metadata:
  name: parkflow-backend
  labels:
    app: parkflow-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: parkflow-backend
  template:
    metadata:
      labels:
        app: parkflow-backend
    spec:
      containers:
        - name: backend
          image: parkflow-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://parkflow-db:5432/parkflow
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: parkflow-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: parkflow-secrets
                  key: db-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: parkflow-backend-svc
spec:
  selector:
    app: parkflow-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
