apiVersion: apps/v1
kind: Deployment
metadata:
  name: parkflow-frontend
  labels:
    app: parkflow-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: parkflow-frontend
  template:
    metadata:
      labels:
        app: parkflow-frontend
    spec:
      containers:
        - name: frontend
          image: parkflow-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: parkflow-frontend-svc
spec:
  selector:
    app: parkflow-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
